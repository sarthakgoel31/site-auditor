<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <!-- Browser window frame -->
  <rect x="4" y="6" width="32" height="26" rx="3" stroke="#1e2a4a" stroke-width="2" fill="none"/>
  <!-- Browser top bar -->
  <line x1="4" y1="13" x2="36" y2="13" stroke="#1e2a4a" stroke-width="1.5"/>
  <!-- Browser dots -->
  <circle cx="9" cy="9.5" r="1.2" fill="#1e2a4a"/>
  <circle cx="13" cy="9.5" r="1.2" fill="#1e2a4a"/>
  <circle cx="17" cy="9.5" r="1.2" fill="#1e2a4a"/>
  <!-- Content lines -->
  <line x1="9" y1="18" x2="21" y2="18" stroke="#1e2a4a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="22" x2="18" y2="22" stroke="#1e2a4a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Magnifying glass -->
  <circle cx="27" cy="24" r="6" stroke="#4361ee" stroke-width="2" fill="white"/>
  <line x1="31.5" y1="28.5" x2="35" y2="32" stroke="#4361ee" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Checkmark inside glass -->
  <path d="M24 24l2 2 4-4.5" stroke="#4361ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
