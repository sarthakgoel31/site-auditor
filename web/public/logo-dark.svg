<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <!-- Rounded square background with gradient -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9b82ff"/>
      <stop offset="100%" stop-color="#6C47FF"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#grad)"/>
  <!-- Magnifying glass body -->
  <circle cx="18" cy="17" r="8" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="24" y1="23" x2="31" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Checkmark inside glass -->
  <path d="M14 17l3 3 5-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
